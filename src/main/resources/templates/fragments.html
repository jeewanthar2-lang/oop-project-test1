<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:fragment="head(title)">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title th:text="${title} ?: 'DineDrop'">DineDrop</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" th:href="@{/css/style.css}">
  <meta name="google-maps-api-key" th:content="${googleMapsApiKey}" content="">

  <style>

    body{
      font-family:'Plus Jakarta Sans',sans-serif;
      background:#0b0c10;
      color:#eaeaea;
    }

    /* NAVBAR */
    .navbar{
      background:rgba(10,10,10,0.75) !important;
      backdrop-filter:blur(15px);
      border-bottom:1px solid rgba(255,255,255,0.08);
    }

    /* BRAND */
    .navbar-brand{
      font-weight:800;
      font-size:1.4rem;
      color:#fff !important;
      letter-spacing:1px;
    }

    .navbar-brand span{
      color:#D4AF37;
    }

    /* NAV LINKS */
    .nav-link{
      color:#cfcfcf !important;
      font-weight:500;
      transition:0.3s;
    }

    .nav-link:hover{
      color:#fff !important;
      text-shadow:0 0 10px rgba(212,175,55,0.6);
    }

    /* BUTTONS */
    .btn-brand{
      background:linear-gradient(135deg,#D4AF37,#b8942f);
      color:#000;
      font-weight:700;
      border:none;
      border-radius:12px;
      padding:8px 16px;
      transition:0.3s;
    }

    .btn-brand:hover{
      transform:translateY(-2px);
      box-shadow:0 0 20px rgba(212,175,55,0.5);
    }

    .btn-outline-brand{
      border:1px solid #D4AF37;
      color:#D4AF37;
      background:transparent;
      font-weight:600;
      border-radius:12px;
      padding:8px 16px;
      transition:0.3s;
    }

    .btn-outline-brand:hover{
      background:#D4AF37;
      color:#000;
    }

    /* DROPDOWN */
    .dropdown-menu{
      background:#111;
      border:1px solid rgba(255,255,255,0.1);
    }

    .dropdown-item{
      color:#ddd;
    }

    .dropdown-item:hover{
      background:#D4AF37;
      color:#000;
    }

    /* FOOTER */
    footer{
      background:#070707;
      color:#aaa;
      padding:40px 0;
      border-top:1px solid rgba(255,255,255,0.05);
    }

    footer h5{
      color:#fff;
      font-weight:700;
    }

    footer span{
      color:#D4AF37;
    }

    /* TOAST */
    .toast-pop{
      position:fixed;
      bottom:20px;
      right:20px;
      background:rgba(0,0,0,0.85);
      color:white;
      padding:12px 18px;
      border-radius:12px;
      border:1px solid rgba(255,255,255,0.1);
      backdrop-filter:blur(10px);
    }

    /* FIX: make navbar text always visible */
    .navbar .nav-link,
    .navbar .dropdown-toggle{
      color:#ddd !important;
    }

    .navbar .nav-link:hover,
    .navbar .dropdown-toggle:hover{
      color:#fff !important;
    }


    /* FIX: ensure dark text on white card surfaces (cards have white bg, body is dark) */
    .card, .dash-card, .card-rest, .card-food, .auth-card,
    .alert, .modal-content, .list-group-item, .table {
      color:#1a1a1a;
    }
    .card .text-muted, .dash-card .text-muted,
    .card-rest .text-muted, .card-food .text-muted,
    .auth-card .text-muted, .alert .text-muted,
    .modal-content .text-muted {
      color:#5a5a5a !important;
    }
    .card h1,.card h2,.card h3,.card h4,.card h5,.card h6,
    .dash-card h1,.dash-card h2,.dash-card h3,.dash-card h4,.dash-card h5,.dash-card h6,
    .auth-card h1,.auth-card h2,.auth-card h3,.auth-card h4,.auth-card h5,.auth-card h6 {
      color:#111;
    }
    /* Form inputs on dark page */
    .form-control, .form-select, textarea.form-control {
      background:#fff; color:#1a1a1a;
    }
    .form-control::placeholder { color:#888; }
    /* Tables */
    .table { background:#fff; }
    .table thead th { color:#111; }
    .table td, .table th { color:#1a1a1a; }


    /* Google map pin-point panels */
    .map-pin-canvas, #storePinMap, #deliveryPinMap{
      width:100%; height:320px; min-height:320px; overflow:hidden !important; position:relative !important; z-index:0; background:#eef5f7; border-radius:14px; border:1px solid #e9ecef;
    }
    .map-fallback{height:100%; min-height:320px; display:flex; align-items:center; justify-content:center; padding:1rem; text-align:center; color:#555; background:#eef5f7; border-radius:14px;}
    .location-preview-map{width:100%; border:0; border-radius:14px; background:#f8f9fa;}

    .no-key-google-map{width:100%;height:100%;border:0;border-radius:14px;display:block;}
    .no-key-map-note{position:absolute;left:12px;right:12px;bottom:12px;background:rgba(255,255,255,.92);color:#333;border-radius:12px;padding:10px 12px;font-size:.85rem;box-shadow:0 6px 18px rgba(0,0,0,.12);}

  </style>

</head>

<body>

<!-- NAVBAR -->
<nav th:fragment="navbar" class="navbar navbar-expand-lg sticky-top">

  <div class="container">

    <!-- LOGO -->
    <a class="navbar-brand" th:href="@{/}">
      🍽 DINE<span>DROP</span>
    </a>

    <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="nav">

      <!-- LEFT -->
      <ul class="navbar-nav me-auto gap-2">

        <li class="nav-item">
          <a class="nav-link" th:href="@{/}">Home</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" th:href="@{/foods}">Browse Foods</a>
        </li>

        <!-- cart moved to right side as a prominent button -->


        <li class="nav-item" th:if="${session.user != null}">
          <a class="nav-link" th:href="
            ${session.user.role == 'CUSTOMER'} ? @{/customer} :
            (${session.user.role == 'OWNER'} ? @{/owner} :
            (${session.user.role == 'RIDER'} ? @{/rider} : @{/admin}))
          ">
            Dashboard
          </a>
        </li>

      </ul>

      <!-- RIGHT -->
      <ul class="navbar-nav align-items-center gap-2">

        <li class="nav-item" th:if="${session.user != null and session.user.role == 'CUSTOMER'}">
          <a class="btn btn-brand position-relative cart-pill" th:href="@{/cart}">
            🛒 <span class="d-none d-md-inline">Cart</span>
            <span th:if="${globalCartCount != null and globalCartCount > 0}"
                  class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
                  th:text="${globalCartCount}">0</span>
          </a>
        </li>

        <li class="nav-item" th:if="${session.user == null}">
          <a class="btn btn-outline-brand" th:href="@{/login}">
            Login
          </a>
        </li>

        <li class="nav-item" th:if="${session.user == null}">
          <a class="btn btn-outline-brand" th:href="@{/register(role='RIDER')}">
            Join Rider
          </a>
        </li>

        <li class="nav-item" th:if="${session.user == null}">
          <a class="btn btn-brand" th:href="@{/register}">
            Sign Up
          </a>
        </li>

        <!-- USER -->
        <li class="nav-item dropdown" th:if="${session.user != null}">

          <a class="nav-link dropdown-toggle" data-bs-toggle="dropdown">
            👤 <span th:text="${session.user.name}">User</span>
          </a>

          <ul class="dropdown-menu dropdown-menu-end">

            <li>
              <a class="dropdown-item" th:href="@{/profile}">
                My Profile
              </a>
            </li>

            <li><hr class="dropdown-divider"></li>

            <li>
              <a class="dropdown-item text-danger" th:href="@{/logout}">
                Logout
              </a>
            </li>

          </ul>

        </li>

      </ul>

    </div>

  </div>

</nav>

<!-- FOOTER -->
<footer th:fragment="footer">

  <div class="container text-center">

    <h5>Dine<span>Drop</span></h5>

    <p>Modern food delivery — fast, fresh, fabulous.</p>

    <small>© 2026 DineDrop. All rights reserved.</small>

  </div>

</footer>

<!-- SCRIPTS -->
<div th:fragment="scripts">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script th:src="@{/js/main.js}"></script>
  <script th:src="@{/js/google-maps.js}"></script>
</div>

<!-- TOAST -->
<div th:fragment="toast(msg)">
  <div class="toast-pop" th:if="${msg}">
    🔔 <span th:text="${msg}">Notification</span>
  </div>
</div>

</body>
</html>
