<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Add Review - FoodieGo')}"></head>
<body>
<nav th:replace="~{fragments :: navbar}"></nav>
<div class="auth-card">
  <h3>⭐ Rate your order</h3>
  <p class="text-muted" th:if="${restaurant != null}">From <strong th:text="${restaurant.name}"></strong></p>
  <form method="post" th:action="@{'/review/add/' + ${order.id}}">
    <div class="mb-3"><label>Rating (1-5)</label>
      <select class="form-select" name="rating">
        <option value="5">★★★★★ Excellent</option>
        <option value="4">★★★★ Good</option>
        <option value="3">★★★ Okay</option>
        <option value="2">★★ Poor</option>
        <option value="1">★ Bad</option>
      </select>
    </div>
    <div class="mb-3"><label>Comment</label><textarea class="form-control" name="comment" rows="3" required></textarea></div>
    <button class="btn btn-brand w-100">Submit Review</button>
  </form>
</div>
<div th:replace="~{fragments :: scripts}"></div>
</body>
</html>
