<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Edit Food - FoodieGo')}"></head>
<body>
<nav th:replace="~{fragments :: navbar}"></nav>
<div class="auth-card" style="max-width:640px">
  <h3>✏️ Edit Food</h3>
  <form method="post" th:action="@{'/owner/food/edit/' + ${f.id}}" enctype="multipart/form-data">
    <div class="mb-3"><label>Name</label><input class="form-control" name="name" th:value="${f.name}" required></div>
    <div class="row">
      <div class="col mb-3"><label>Category</label><input class="form-control" name="category" th:value="${f.category}" required></div>
      <div class="col mb-3"><label>Price</label><input class="form-control" type="number" step="0.01" name="price" th:value="${f.price}" required></div>
    </div>
    <div class="mb-3"><label>Description</label><textarea class="form-control" name="description" rows="2" th:text="${f.description}"></textarea></div>
    <div class="mb-3"><label>Replace Image</label><input type="file" class="form-control" name="image" accept="image/*"></div>
    <button class="btn btn-brand w-100">Save</button>
  </form>
</div>
<div th:replace="~{fragments :: scripts}"></div>
</body>
</html>
