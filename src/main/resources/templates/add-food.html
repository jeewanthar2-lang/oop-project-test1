<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Add Food - FoodieGo')}"></head>
<body>
<nav th:replace="~{fragments :: navbar}"></nav>
<div class="auth-card" style="max-width:640px">
  <h3>🍔 Add Food <small class="text-muted fs-6" th:text="'to ' + ${restaurant.name}"></small></h3>
  <form method="post" th:action="@{'/owner/food/add/' + ${restaurant.id}}" enctype="multipart/form-data">
    <div class="mb-3"><label>Name</label><input class="form-control" name="name" required></div>
    <div class="row">
      <div class="col mb-3"><label>Category</label><input class="form-control" name="category" placeholder="Pizza, Burger..." required></div>
      <div class="col mb-3"><label>Price (Rs.)</label><input class="form-control" type="number" step="0.01" name="price" required></div>
    </div>
    <div class="mb-3"><label>Description</label><textarea class="form-control" name="description" rows="2"></textarea></div>
    <div class="mb-3"><label>Image</label><input type="file" class="form-control" name="image" accept="image/*"></div>
    <button class="btn btn-brand w-100">Add Food</button>
  </form>
</div>
<div th:replace="~{fragments :: scripts}"></div>
</body>
</html>
