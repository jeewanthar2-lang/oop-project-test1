<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Edit Restaurant - FoodieGo')}"></head>
<body>
<nav th:replace="~{fragments :: navbar}"></nav>
<div class="auth-card" style="max-width:820px">
  <h3>✏️ Edit Restaurant</h3>
  <form method="post" th:action="@{'/owner/restaurant/edit/' + ${r.id}}" enctype="multipart/form-data">
    <div class="mb-3"><label>Name</label><input class="form-control" name="name" th:value="${r.name}" required></div>
    <div class="row">
      <div class="col mb-3"><label>City</label><input class="form-control" id="city" name="city" th:value="${r.city}" required></div>
      <div class="col mb-3"><label>Cuisine</label><input class="form-control" name="cuisine" th:value="${r.cuisine}" required></div>
    </div>
    <div class="mb-3"><label>Address</label><input class="form-control" id="address" name="address" th:value="${r.address}" required></div>

    <div class="dash-card mb-3 p-3">
      <h6 class="mb-2">📍 Store Location Pin</h6>
      <p class="text-muted small mb-2">Use the Google map pin when an API key is configured, or type GPS coordinates/use current location. Press “Add this location” to save the selected pin.</p>
      <div id="storePinMap" class="map-pin-canvas w-100 rounded mb-3"></div>
      <div class="row g-2 align-items-end">
        <div class="col-md-4">
          <label class="form-label small">Latitude</label>
          <input type="number" step="any" class="form-control" id="latitude" name="latitude" th:value="${r.latitude}" placeholder="e.g. 6.927079">
        </div>
        <div class="col-md-4">
          <label class="form-label small">Longitude</label>
          <input type="number" step="any" class="form-control" id="longitude" name="longitude" th:value="${r.longitude}" placeholder="e.g. 79.861244">
        </div>
        <div class="col-md-4 d-grid gap-2">
          <button type="button" class="btn btn-brand btn-sm" id="addStorePin">Add this location</button>
          <button type="button" class="btn btn-outline-brand btn-sm" id="useStoreLocation">Use my current location</button>
        </div>
      </div>
      <div class="d-flex flex-wrap gap-2 mt-3 mb-2">
        <button type="button" class="btn btn-outline-secondary btn-sm" id="clearStorePin">Use typed address instead</button>
        <a target="_blank" class="btn btn-outline-secondary btn-sm" id="openStoreMap" th:href="${r.googleMapsUrl}">Open in Google Maps ↗</a>
      </div>
      <small class="text-muted d-block mb-2" id="coordText">Location preview</small>
      <iframe id="storeMap" class="location-preview-map w-100 rounded" style="height:220px" loading="lazy"
              th:src="${r.mapEmbedUrl}"></iframe>
    </div>

    <div class="mb-3"><label>Description</label><textarea class="form-control" name="description" rows="2" th:text="${r.description}"></textarea></div>
    <div class="mb-3"><label>Replace Image</label><input type="file" class="form-control" name="image" accept="image/*"></div>
    <button class="btn btn-brand w-100">Save</button>
  </form>
</div>
<div th:replace="~{fragments :: scripts}"></div>
</body>
</html>
