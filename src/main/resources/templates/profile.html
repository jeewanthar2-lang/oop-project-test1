<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('My Profile - FoodieGo')}"></head>
<body>
<nav th:replace="~{fragments :: navbar}"></nav>

<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-7">
      <div class="dash-card">
        <h3>👤 My Profile <small class="text-muted fs-6" th:text="'(' + ${user.role} + ')'">role</small></h3>
        <div th:if="${param.saved}" class="alert alert-success mt-2">✅ Profile updated successfully!</div>
        <div th:if="${error}" class="alert alert-danger mt-2" th:text="${error}"></div>
        <form method="post" th:action="@{/profile}" class="mt-3">
          <div class="mb-3"><label>Name</label><input class="form-control" name="name" th:value="${user.name}" required></div>
          <div class="mb-3"><label>Email (locked)</label><input class="form-control" th:value="${user.email}" disabled></div>
          <div class="mb-3"><label>Phone</label><input class="form-control" name="phone" th:value="${user.phone}"></div>
          <div class="mb-3" th:if="${user.role == 'OWNER' or user.role == 'RIDER'}">
            <label>City</label><input class="form-control" name="city" th:value="${user.city}">
          </div>
          <div class="mb-3" th:if="${user.role == 'RIDER'}">
            <label>Vehicle Type</label>
            <select class="form-control" name="vehicle" required>
              <option value="">Select your vehicle</option>
              <option value="Bike" th:selected="${user.vehicle == 'Bike'}">Bike</option>
              <option value="Scooter" th:selected="${user.vehicle == 'Scooter'}">Scooter</option>
              <option value="Car" th:selected="${user.vehicle == 'Car'}">Car</option>
              <option value="Van" th:selected="${user.vehicle == 'Van'}">Van</option>
            </select>
          </div>
          <div class="mb-3" th:if="${user.role == 'RIDER'}">
            <label>ID / NIC Number</label>
            <input class="form-control" name="licenseNumber" th:value="${user.licenseNumber}"
                   pattern="(\d{12}|\d{9}[VvXx])" maxlength="12" inputmode="text" required
                   placeholder="e.g. 200012345678"
                   title="Use 12 digits or old NIC format: 9 digits followed by V or X">
          </div>
          <div class="mb-3" th:if="${user.role == 'RIDER'}">
            <label>Vehicle Number</label>
            <input class="form-control" name="licensePlate" th:value="${user.licensePlate}"
                   pattern="([A-Za-z]{2,3}-)?[A-Za-z]{2,3}-\d{4}" maxlength="12" required
                   style="text-transform:uppercase"
                   placeholder="e.g. WP-CAB-1234"
                   title="Use ABC-1234 or WP-CAB-1234 format">
          </div>
          <div class="mb-3"><label>New Password (leave blank to keep)</label><input type="password" class="form-control" name="password"></div>
          <button class="btn btn-brand">Save Changes</button>
        </form>
        <hr class="my-4">
        <form method="post" th:action="@{/profile/delete}" data-confirm="Permanently delete your account?">
          <button class="btn btn-outline-danger">Delete My Account</button>
        </form>
      </div>
    </div>
  </div>
</div>

<footer th:replace="~{fragments :: footer}"></footer>
<div th:replace="~{fragments :: scripts}"></div>
</body>
</html>
