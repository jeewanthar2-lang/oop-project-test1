<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Reviews - FoodieGo')}"></head>
<body>
<nav th:replace="~{fragments :: navbar}"></nav>
<div class="container py-5">
  <h2 class="mb-4">⭐ Reviews</h2>
  <div class="empty" th:if="${#lists.isEmpty(reviews)}">
    <div class="emoji">💬</div>
    <p>No reviews yet.</p>
  </div>
  <div class="row g-3">
    <div class="col-md-6" th:each="rv : ${reviews}">
      <div class="dash-card">
        <div class="d-flex justify-content-between">
          <div>
            <div class="stars" th:text="${'★★★★★'.substring(0, rv.rating)}">★</div>
            <strong th:text="${rv.customerName}">user</strong>
            <small class="text-muted" th:if="${restaurantService != null and restaurantService.byId(rv.restaurantId) != null}">
              · <span th:text="${restaurantService.byId(rv.restaurantId).name}"></span>
            </small>
          </div>
          <small class="text-muted" th:text="${rv.createdAt}">date</small>
        </div>
        <p class="mt-2 mb-0" th:text="${rv.comment}">comment</p>

        <div class="mt-2 d-flex gap-2">
          <a th:if="${session.user != null and #strings.equals(session.user.id, rv.customerId)}"
             class="btn btn-sm btn-outline-primary"
             th:href="@{'/review/edit/' + ${rv.id}}">Edit</a>

          <form th:if="${session.user != null and session.user.role == 'ADMIN'}"
                method="post"
                th:action="@{'/admin/reviews/delete/' + ${rv.id}}"
                data-confirm="Delete this review?">
            <button class="btn btn-sm btn-outline-danger">Delete</button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
<footer th:replace="~{fragments :: footer}"></footer>
<div th:replace="~{fragments :: scripts}"></div>
</body>
</html>
